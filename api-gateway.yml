# =============================================================================
# API GATEWAY CONFIG
# =============================================================================
# Fetched ONLY by api-gateway from Config Server.
# Common settings (eureka, jpa defaults) come from application.yml automatically.
# =============================================================================

server:
  port: 5000

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "https://zosh-fly.vercel.app"
              - "https://zosh-air.vercel.app"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            exposedHeaders:
              - "Authorization"
            maxAge: 3600